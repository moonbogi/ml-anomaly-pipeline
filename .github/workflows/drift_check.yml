name: Daily Drift Check

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC daily
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install evidently pandas numpy

      - name: Run drift check
        run: python -m src.monitoring.drift

      - name: Upload drift reports
        uses: actions/upload-artifact@v4
        with:
          name: drift-reports-${{ github.run_id }}
          path: monitoring_reports/

      - name: Alert on drift
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Data drift detected - retraining may be needed',
              body: `Drift check failed on ${new Date().toISOString()}. Check the workflow run for details.`,
              labels: ['drift', 'ml-ops']
            })
