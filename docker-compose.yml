version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_NAME=anomaly-detector
      - MODEL_VERSION=1
      - ANOMALY_THRESHOLD=0.034
      - MLFLOW_TRACKING_URI=sqlite:///mlflow.db
    volumes:
      - ./mlflow.db:/app/mlflow.db
      - ./mlruns:/app/mlruns
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  mlflow:
    image: python:3.11-slim
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow ui --host 0.0.0.0 --port 5000 --backend-store-uri sqlite:///mlflow.db"
    ports:
      - "5000:5000"
    volumes:
      - ./mlflow.db:/mlflow.db
      - ./mlruns:/mlruns
